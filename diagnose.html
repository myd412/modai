<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨岱科技 · 小微企业诊断</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background:#f5f5f5; color:#333; -webkit-font-smoothing:antialiased; }
.screen { display:none; min-height:100vh; }
.screen.active { display:block; }

/* Welcome */
.welcome { background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color:#fff; text-align:center; padding:60px 32px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
.welcome .logo { width:80px; height:80px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
.welcome .logo img { width:100%; height:100%; object-fit:cover; }
.welcome h1 { font-size:28px; font-weight:500; margin-bottom:8px; }
.welcome .sub { font-size:15px; color:rgba(255,255,255,0.7); margin-bottom:40px; line-height:1.6; }
.welcome .features { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:48px; }
.welcome .feat { background:rgba(255,255,255,0.1); border-radius:20px; padding:8px 16px; font-size:13px; }
.welcome .start-btn { background:#fff; color:#1a1a2e; border:none; border-radius:28px; padding:14px 64px; font-size:17px; font-weight:500; cursor:pointer; transition:transform 0.2s; }
.welcome .start-btn:active { transform:scale(0.96); }
.welcome .footer-note { margin-top:32px; font-size:12px; color:rgba(255,255,255,0.4); }

/* Question Screen */
.question-screen { background:#fff; }
.q-header { padding:16px 20px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; }
.q-header .brand { font-size:14px; font-weight:500; color:#1a1a2e; }
.q-header .step { font-size:12px; color:#999; }
.q-progress-wrap { padding:0 20px; height:4px; background:#eee; }
.q-progress-bar { height:100%; background:linear-gradient(90deg, #0f3460, #1a1a2e); transition:width 0.3s; border-radius:0; }
.q-body { padding:40px 24px; }
.q-section-label { font-size:12px; color:#999; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.q-section-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.q-section-dot.sales { background:#e67e22; }
.q-section-dot.ops { background:#27ae60; }
.q-section-dot.fin { background:#e74c3c; }
.q-section-dot.profile { background:#7f8c8d; }
.q-title { font-size:20px; font-weight:500; line-height:1.5; margin-bottom:32px; color:#1a1a2e; }
.q-options { display:flex; flex-direction:column; gap:12px; }
.q-option { border:1.5px solid #e0e0e0; border-radius:12px; padding:16px 20px; font-size:15px; cursor:pointer; transition:all 0.2s; background:#fff; text-align:left; line-height:1.5; color:#333; }
.q-option:active { transform:scale(0.98); }
.q-option.selected { border-color:#1a1a2e; background:#f0f4ff; }
.q-next { display:block; width:100%; margin:32px 24px 0; padding:14px; background:#1a1a2e; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:500; cursor:pointer; opacity:0.3; pointer-events:none; transition:all 0.2s; }
.q-next.enabled { opacity:1; pointer-events:auto; }
.q-next:active { background:#16213e; }

/* Probe overlay */
.probe-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:100; }
.probe-overlay.show { display:flex; }
.probe-card { background:#fff; border-radius:16px; padding:28px 24px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; }
.probe-card h3 { font-size:16px; font-weight:500; margin-bottom:20px; }
.probe-card .q-options { gap:8px; }
.probe-card .q-option { padding:12px 16px; font-size:14px; }
.probe-card .skip { display:block; width:100%; margin-top:16px; padding:10px; background:none; border:1px solid #ddd; border-radius:10px; font-size:14px; color:#999; cursor:pointer; }

/* Report Screen */
.report-screen { background:#f5f5f5; padding-bottom:40px; }
.report-header { background:linear-gradient(135deg, #1a1a2e, #0f3460); color:#fff; padding:40px 24px 32px; text-align:center; }
.report-type-tag { display:inline-block; background:rgba(255,255,255,0.15); border-radius:20px; padding:6px 20px; font-size:13px; margin-bottom:12px; }
.report-header h2 { font-size:22px; font-weight:500; margin-bottom:6px; }
.report-header .date { font-size:12px; color:rgba(255,255,255,0.6); }
.report-score-cards { display:flex; gap:12px; padding:20px 24px; }
.report-score-cards .card { flex:1; background:#fff; border-radius:12px; padding:16px 12px; text-align:center; }
.report-score-cards .card .label { font-size:12px; color:#999; margin-bottom:6px; }
.report-score-cards .card .score { font-size:22px; font-weight:500; }
.report-score-cards .card .light { display:inline-block; width:10px; height:10px; border-radius:50%; margin-top:4px; }
.light-green { background:#27ae60; }
.light-yellow { background:#f39c12; }
.light-red { background:#e74c3c; }
.report-section { background:#fff; border-radius:12px; margin:12px 24px; padding:20px; }
.report-section h3 { font-size:15px; font-weight:500; margin-bottom:12px; color:#1a1a2e; }
.report-section p { font-size:15px; line-height:2; color:#333; margin-bottom:10px; }
.report-section .finding { background:#fff8e1; border-left:3px solid #f39c12; padding:12px 16px; margin:10px 0; font-size:13px; line-height:1.6; border-radius:0 8px 8px 0; }
.report-section .finding.green { background:#e8f5e9; border-color:#27ae60; }
.report-section .finding.red { background:#ffebee; border-color:#e74c3c; }

/* Report typography improvements */
.report-section .sec-title { font-size:17px; font-weight:600; color:#1a1a2e; margin:24px 0 12px; padding-bottom:8px; border-bottom:1px solid #eee; }
.report-section .sec-title:first-child { margin-top:0; }
.report-section .warn-box { color:#c0392b; background:#fff5f5; border-left:3px solid #e74c3c; padding:14px 16px; margin:14px 0; font-size:14px; line-height:1.9; border-radius:0 10px 10px 0; }
.report-section .overview-num { font-size:15px; line-height:2.2; color:#333; margin-bottom:6px; padding-left:4px; }
.report-section .overview-lead { font-size:17px; font-weight:500; color:#1a1a2e; line-height:2; margin-bottom:14px; }
.report-section .overview-warn { font-size:14px; line-height:2; color:#c0392b; margin:10px 0; padding:10px 14px; background:#fff5f5; border-radius:8px; }
.report-section .closing { font-size:15px; line-height:2; color:#888; margin-bottom:8px; }

/* QR section */
.qr-section { background:#fff; border-radius:12px; margin:12px 24px; padding:24px; text-align:center; }
.qr-section p { font-size:14px; color:#666; margin-bottom:14px; }
.qr-section img { width:180px; height:180px; border-radius:8px; object-fit:cover; }

.report-blur { position:relative; }
.report-blur::after { content:' '; position:absolute; inset:0; background:rgba(255,255,255,0.7); backdrop-filter:blur(8px); border-radius:12px; display:flex; align-items:center; justify-content:center; }
.report-lock { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2; }
.report-lock .lock-icon { font-size:48px; margin-bottom:12px; }
.report-lock .lock-text { font-size:14px; color:#666; margin-bottom:16px; text-align:center; line-height:1.6; }
.report-lock .unlock-btn { background:#1a1a2e; color:#fff; border:none; border-radius:24px; padding:12px 40px; font-size:15px; font-weight:500; cursor:pointer; }

/* Lead form overlay */
.lead-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:200; }
.lead-overlay.show { display:flex; }
.lead-card { background:#fff; border-radius:16px; padding:32px 24px; width:90%; max-width:380px; }
.lead-card h3 { font-size:18px; font-weight:500; margin-bottom:8px; text-align:center; }
.lead-card .lead-sub { font-size:13px; color:#999; text-align:center; margin-bottom:24px; line-height:1.5; }
.lead-card .field { margin-bottom:16px; }
.lead-card .field label { display:block; font-size:13px; color:#666; margin-bottom:6px; }
.lead-card .field input { width:100%; padding:12px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:15px; outline:none; transition:border 0.2s; }
.lead-card .field input:focus { border-color:#1a1a2e; }
.lead-card .field input.optional::placeholder { color:#bbb; }
.lead-card .submit-btn { width:100%; padding:14px; background:#1a1a2e; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:500; cursor:pointer; margin-top:8px; }
.lead-card .submit-btn:disabled { opacity:0.5; }
.lead-card .privacy { font-size:11px; color:#bbb; text-align:center; margin-top:12px; line-height:1.5; }
.lead-card .close-lead { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; border:none; background:#f5f5f5; font-size:16px; cursor:pointer; color:#999; }
.lead-card { position:relative; }

/* Sharing section */
.share-section { text-align:center; padding:24px; }
.share-section .share-btn { background:#27ae60; color:#fff; border:none; border-radius:24px; padding:12px 32px; font-size:15px; cursor:pointer; }
.share-section .share-note { font-size:12px; color:#999; margin-top:8px; }

/* Contact section */
.contact-section { background:#fff; border-radius:12px; margin:12px 24px; padding:24px; text-align:center; }
.contact-section h4 { font-size:15px; font-weight:500; margin-bottom:8px; }
.contact-section p { font-size:13px; color:#666; line-height:1.6; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation:fadeIn 0.4s ease; }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="screen active" id="screen-welcome">
  <div class="welcome">
    <div class="logo" id="brand-logo"><img src="logo.png" alt="墨岱科技" style="width:80px;height:80px;border-radius:50%;object-fit:cover;"></div>
    <h1>小微企业诊断工具</h1>
    <div class="sub">基于系统动力学的企业问题快速诊断<br>完成30道题，大约3分钟</div>
    <div class="features">
      <span class="feat">📊 业绩诊断</span>
      <span class="feat">🏭 交付诊断</span>
      <span class="feat">💰 财务诊断</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">开始诊断</button>
    <div class="footer-note">墨岱科技 · AI驱动企业智能化升级</div>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="screen-question">
  <div class="question-screen">
    <div class="q-header">
      <span class="brand">墨岱科技</span>
      <span class="step" id="q-step">第 1 / 30 题</span>
    </div>
    <div class="q-progress-wrap"><div class="q-progress-bar" id="q-progress" style="width:3%"></div></div>
    <div class="q-body" id="q-body"></div>
    <button class="q-next" id="q-next" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- PROBE OVERLAY -->
<div class="probe-overlay" id="probe-overlay">
  <div class="probe-card" id="probe-card"></div>
</div>

<!-- REPORT SCREEN -->
<div class="screen" id="screen-report">
  <div class="report-screen" id="report-content"></div>
</div>

<!-- LEAD FORM OVERLAY -->
<div class="lead-overlay" id="lead-overlay">
  <div class="lead-card">
    <button class="close-lead" onclick="closeLead()">✕</button>
    <h3>查看完整诊断报告</h3>
    <div class="lead-sub">填写以下信息，即可免费查看完整报告和针对性建议</div>
    <form id="lead-form" method="POST" action="https://formsubmit.co/03360317@163.com" target="form-target" onsubmit="handleLeadSubmit()">
      <input type="hidden" name="_subject" value="【墨岱科技】新留资：企业诊断报告">
      <input type="hidden" name="_next" id="form-redirect" value="https://myd412.github.io/modai/diagnose.html">
      <input type="hidden" name="sales_score" id="hf-sales">
      <input type="hidden" name="ops_score" id="hf-ops">
      <input type="hidden" name="fin_score" id="hf-fin">
      <input type="hidden" name="boss_score" id="hf-boss">
      <input type="hidden" name="answers" id="hf-answers">
      <div class="field"><label>姓名 *</label><input type="text" name="姓名" placeholder="请输入您的姓名" required></div>
      <div class="field"><label>手机号 *</label><input type="tel" name="手机号" placeholder="请输入您的手机号" maxlength="11" required></div>
      <div class="field"><label>企业名称（选填）</label><input type="text" name="企业名称" placeholder="选填，方便我们更好了解您" class="optional"></div>
      <button class="submit-btn" type="submit" id="lead-submit">查看完整报告</button>
    </form>
    <div class="privacy">您的信息仅用于本次诊断服务，不会泄露给第三方</div>
  </div>
</div>

<!-- 隐藏iframe，用于表单提交不跳转页面 -->
<iframe name="form-target" style="display:none;"></iframe>

<script>
// ===================== DATA =====================

const QUESTIONS = [
  // === Q1-Q3: 企业画像 ===
  { id:1, section:'profile', title:'您企业现在一共多少人？', options:[
    {text:'A. 10人以下', val:0},{text:'B. 10-30人', val:0},{text:'C. 30-60人', val:0},{text:'D. 60-100人', val:0}
  ], line:'profile', scoreIdx:null },

  { id:2, section:'profile', title:'您企业主要做什么业务？', options:[
    {text:'A. 生产制造/加工', val:0},{text:'B. 建筑施工/安装/工程', val:0},{text:'C. 批发/贸易/零售', val:0},{text:'D. 服务（设计/咨询/物流等）', val:0},{text:'E. 其他', val:0}
  ], line:'profile', scoreIdx:null },

  { id:3, section:'profile', title:'您企业经营多长时间了？', options:[
    {text:'A. 不到1年', val:0},{text:'B. 1-3年', val:0},{text:'C. 3-5年', val:0},{text:'D. 5年以上', val:0}
  ], line:'profile', scoreIdx:null },

  // === Q4-Q13: 业绩开展线 (10题, 满分30) ===
  { id:4, section:'sales', title:'您现在的客户，主要是怎么知道您、找到您的？', options:[
    {text:'A. 全靠我自己的人脉和关系', val:1},{text:'B. 老客户转介绍为主', val:2},{text:'C. 业务员在外面跑出来的', val:3},{text:'D. 多种渠道都有，比较均衡', val:4}
  ], line:'sales', scoreIdx:0 },

  { id:5, section:'sales', title:'您最大的一个客户，占您总营收的比例大概是多少？', options:[
    {text:'A. 超过三分之一', val:1},{text:'B. 大概五分之一到三分之一', val:3},{text:'C. 不到五分之一，客户都比较分散', val:4},{text:'D. 不到五分之一，但前三大客户占了大半', val:2}
  ], line:'sales', scoreIdx:1, probeIf:[0], probeQ:{title:'这个大客户，主要是谁的关系？', options:[
    {text:'A. 我自己的关系', val:-1},{text:'B. 公司整体的合作关系', val:0}
  ]}},

  { id:6, section:'sales', title:'您公司专门负责找客户、跑业务的人，有几个？', options:[
    {text:'A. 就我自己', val:1},{text:'B. 1-2个人', val:2},{text:'C. 3-5个人', val:3},{text:'D. 5个人以上', val:4}
  ], line:'sales', scoreIdx:2 },

  { id:7, section:'sales', title:'对于"接下来一两个月能签多少单"，您心里有数吗？', options:[
    {text:'A. 完全没数，来什么算什么', val:1},{text:'B. 大概有个感觉', val:2},{text:'C. 心里有数，有明确的意向客户清单', val:3}
  ], line:'sales', scoreIdx:3 },

  { id:8, section:'sales', title:'来咨询或询价的客户，最后实际下单的大概占多少？', options:[
    {text:'A. 不到三成', val:1},{text:'B. 大概三到五成', val:2},{text:'C. 五到八成', val:3},{text:'D. 基本问了就下单', val:2}
  ], line:'sales', scoreIdx:4, probeIf:[0], probeQ:{title:'没成交的客户，最主要因为什么？', options:[
    {text:'A. 价格谈不拢', val:0},{text:'B. 交期不满足', val:0},{text:'C. 沟通着就没下文了', val:0},{text:'D. 客户比了一圈选了别人', val:0}
  ]}},

  { id:9, section:'sales', title:'成交过的客户，后面还会再来找您下单吗？', options:[
    {text:'A. 不多，很多做一单就没了', val:1},{text:'B. 有一部分会回头，但不太稳定', val:2},{text:'C. 大部分都是长期合作的，比较稳定', val:3}
  ], line:'sales', scoreIdx:5, probeIf:[0], probeQ:{title:'您觉得老客户不再来，最主要的原因是什么？', options:[
    {text:'A. 质量没达到人家预期', val:0},{text:'B. 交期总是拖', val:0},{text:'C. 服务态度或沟通出问题了', val:0},{text:'D. 竞争对手更便宜', val:0},{text:'E. 不清楚具体原因', val:0}
  ]}},

  { id:10, section:'sales', title:'您有安排人专门做老客户回访、关系维护这些事吗？', options:[
    {text:'A. 完全没有，没人管', val:1},{text:'B. 偶尔会联系一下，但不固定', val:2},{text:'C. 有，定期回访老客户', val:3}
  ], line:'sales', scoreIdx:6 },

  { id:11, section:'sales', title:'为了拿下单子，您有没有答应过自己心里清楚"可能做不到"的条件？', options:[
    {text:'A. 经常有，不答应拿不下单', val:1},{text:'B. 偶尔有，但不是常态', val:2},{text:'C. 从不，能做到的才敢答应', val:3}
  ], line:'sales', scoreIdx:7, probeIf:[0], probeQ:{title:'答应过但没做到的，主要是哪方面？', options:[
    {text:'A. 交期（答应了但出不来）', val:0},{text:'B. 价格（报了价又加钱）', val:0},{text:'C. 质量/效果（说得天花乱坠实际打了折）', val:0},{text:'D. 都有一点', val:0}
  ]}},

  { id:12, section:'sales', title:'您的客户，会主动给您介绍新客户来吗？', options:[
    {text:'A. 极少，几乎没有', val:1},{text:'B. 偶尔有一两个', val:2},{text:'C. 挺多的，转介绍是重要获客方式', val:3}
  ], line:'sales', scoreIdx:8 },

  { id:13, section:'sales', title:'过去一年里，有没有老客户明确表示不满意然后不再合作了？', options:[
    {text:'A. 有，还不止一两个', val:1},{text:'B. 好像有一两个，记不太清了', val:2},{text:'C. 没有，合作都比较稳定', val:3}
  ], line:'sales', scoreIdx:9 },

  // === Q14-Q22: 生产交付线 (9题, 满分27) ===
  { id:14, section:'ops', title:'从客户下单到最终交付完，您平均大概要多久？', options:[
    {text:'A. 3天以内', val:3},{text:'B. 3天到1周', val:3},{text:'C. 1周到2周', val:2},{text:'D. 超过2周', val:1}
  ], line:'ops', scoreIdx:0 },

  { id:15, section:'ops', title:'您的车间/项目组目前是什么状态？', options:[
    {text:'A. 不太忙，好多人闲着', val:1},{text:'B. 正常节奏，不累也不太闲', val:3},{text:'C. 比较忙，经常加班赶活', val:2},{text:'D. 忙不过来了，不太敢接新单了', val:1}
  ], line:'ops', scoreIdx:1 },

  { id:16, section:'ops', title:'您的生产/施工任务是怎么安排先后的？', options:[
    {text:'A. 没排产，谁催得急先做谁的', val:1},{text:'B. 有个大概安排，但经常被催就变了', val:2},{text:'C. 有明确排产计划，按计划推进', val:3}
  ], line:'ops', scoreIdx:2, probeIf:[0,1], probeQ:{title:'插到前面去的单子，一般是因为什么？', options:[
    {text:'A. 客户催得厉害', val:0},{text:'B. 大客户的单，不敢得罪', val:0},{text:'C. 老板直接交代的', val:0},{text:'D. 前面缺料或出问题，换个单先做', val:0}
  ]}},

  { id:17, section:'ops', title:'最近半年，有没有因为质量问题被客户要求退货、返工或扣款的？', options:[
    {text:'A. 有，还挺多次的', val:1},{text:'B. 偶尔有一两次', val:2},{text:'C. 基本没有', val:3}

// ===================== STATE =====================
let currentQ = 0;
let answers = new Array(30).fill(-1);
let probeAnswers = {};
let scores = { sales:0, ops:0, fin:0, boss:0 };
let scoreMax = { sales:30, ops:27, fin:21, boss:6 };
let leadSubmitted = false;

// ===================== UI HELPERS =====================
function $(id) { return document.getElementById(id); }

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function showProbe(qIdx) {
  let q = QUESTIONS[qIdx];
  if (!q.probeQ) return false;
  let chosen = answers[qIdx];
  if (chosen < 0) return false;
  if (q.probeIf && !q.probeIf.includes(chosen)) return false;
  let card = $('probe-card');
  let html = '<h3>'+q.probeQ.title+'</h3><div class="q-options">';
  q.probeQ.options.forEach((opt, i) => {
    html += '<div class="q-option" onclick="selectProbe('+qIdx+','+i+')" id="popt-'+qIdx+'-'+i+'">'+opt.text+'</div>';
  });
  html += '</div><button class="skip" onclick="skipProbe('+qIdx+')">跳过</button>';
  card.innerHTML = html;
  $('probe-overlay').classList.add('show');
  return true;
}

function selectProbe(qIdx, optIdx) {
  probeAnswers[qIdx] = optIdx;
  document.querySelectorAll('#probe-card .q-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('popt-'+qIdx+'-'+optIdx).classList.add('selected');
  setTimeout(() => { $('probe-overlay').classList.remove('show'); nextQuestion(); }, 300);
}

function skipProbe(qIdx) {
  probeAnswers[qIdx] = -1;
  $('probe-overlay').classList.remove('show');
  nextQuestion();
}

// ===================== QUIZ FLOW =====================
function startQuiz() {
  currentQ = 0;
  answers.fill(-1);
  probeAnswers = {};
  scores = { sales:0, ops:0, fin:0, boss:0 };
  leadSubmitted = false;
  switchScreen('screen-question');
  renderQuestion();
}

function renderQuestion() {
  if (currentQ >= QUESTIONS.length) {
    calcScores();
    showReport();
    return;
  }
  let q = QUESTIONS[currentQ];
  $('q-step').textContent = '第 '+(currentQ+1)+' / '+QUESTIONS.length+' 题';
  $('q-progress').style.width = ((currentQ/QUESTIONS.length)*100)+'%';
  
  let sectionLabels = { profile:'企业画像', sales:'业绩开展线', ops:'生产交付线', fin:'财务管控线', boss:'综合' };
  let sectionColors = { profile:'profile', sales:'sales', ops:'ops', fin:'fin', boss:'profile' };
  
  let html = '';
  html += '<div class="q-section-label"><span class="q-section-dot '+sectionColors[q.section]+'"></span>'+sectionLabels[q.section]+'</div>';
  html += '<div class="q-title">'+q.title+'</div>';
  html += '<div class="q-options">';
  q.options.forEach((opt, i) => {
    let sel = answers[currentQ] === i ? ' selected' : '';
    html += '<div class="q-option'+sel+'" onclick="selectOption('+i+')" id="opt-'+i+'">'+opt.text+'</div>';
  });
  html += '</div>';
  $('q-body').innerHTML = html;
  
  let nextBtn = $('q-next');
  nextBtn.classList.remove('enabled');
  if (answers[currentQ] >= 0) nextBtn.classList.add('enabled');
  
  // Scroll to top
  window.scrollTo(0,0);
}

function selectOption(idx) {
  answers[currentQ] = idx;
  let q = QUESTIONS[currentQ];
  document.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('opt-'+idx).classList.add('selected');
  $('q-next').classList.add('enabled');
}

function nextQuestion() {
  if (answers[currentQ] < 0) return;
  // Check for probe (probeAnswers[currentQ] === undefined means not yet shown)
  if (probeAnswers[currentQ] === undefined && showProbe(currentQ)) {
    return;
  }
  currentQ++;
  if (currentQ < QUESTIONS.length) {
    renderQuestion();
  } else {
    calcScores();
    showReport();
  }
}

// ===================== SCORING =====================
function calcScores() {
  scores = { sales:0, ops:0, fin:0, boss:0 };
  QUESTIONS.forEach((q, i) => {
    if (q.scoreIdx === null) return;
    let ans = answers[i];
    if (ans < 0 || ans >= q.options.length) return;
    let baseScore = q.options[ans].val;
    // Apply probe penalty
    if (q.probeQ && probeAnswers[i] >= 0 && q.probeQ.options[probeAnswers[i]].val < 0) {
      baseScore += q.probeQ.options[probeAnswers[i]].val;
      if (baseScore < 0) baseScore = 0;
    }
    scores[q.line] = (scores[q.line] || 0) + (q.line === 'boss' ? baseScore * 2 : baseScore);
  });
}

// ===================== REPORT GENERATION (Article Style) =====================

function rateLine(line) {
  let pct = scoreMax[line] > 0 ? scores[line] / scoreMax[line] : 0;
  if (pct >= 0.7) return 'green';
  if (pct >= 0.5) return 'yellow';
  return 'red';
}

function getOverallType() {
  let rs=rateLine('sales'), ro=rateLine('ops'), rf=rateLine('fin');
  if(rs==='red'||ro==='red'||rf==='red') return '需要您认真对待的几个信号';
  if(rs==='yellow'||ro==='yellow'||rf==='yellow') return '运转中，但有些螺丝松了';
  return '底子不错，可以跑得更快';
}
